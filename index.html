<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>News PA Diary Sorter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --purple: #4700A3;
    --purple-light: #6a1fd4;
    --purple-pale: #f0ebfb;
    --teal: #1FD1BD;
    --teal-dark: #17a899;
    --teal-light: #e4faf8;
    --text: #1a1032;
    --muted: #6b6482;
    --border: #e4ddf2;
    --bg: #f8f6fc;
    --white: #ffffff;

    --focus1: #c0392b;
    --focus2: #1a6fa8;
    --london: #e67e22;
    --hub-se: #27ae60;
    --hub-sw: #8e44ad;
    --hub-n: #2980b9;
    --scotland: #16a085;
    --ni: #d35400;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: #ffffff;
    border-bottom: 3px solid var(--purple);
    padding: 0 40px;
    display: flex;
    align-items: stretch;
    gap: 0;
    min-height: 72px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 20px;
    flex: 1;
    padding: 16px 0;
    border-right: 1px solid var(--border);
    margin-right: 32px;
    padding-right: 32px;
  }

  .header-text h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    color: var(--purple);
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .header-text p {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 400;
  }

  .header-logo {
    display: flex;
    align-items: center;
    padding: 14px 0;
    flex-shrink: 0;
  }

  .header-logo svg {
    height: 38px;
    width: auto;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 24px 60px;
  }

  .input-section {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 28px;
    box-shadow: 0 1px 4px rgba(81,45,109,0.06);
  }

  .input-section label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--purple);
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    min-height: 180px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    resize: vertical;
    background: var(--bg);
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus {
    outline: none;
    border-color: var(--purple);
    background: white;
  }

  textarea::placeholder {
    color: var(--muted);
    opacity: 0.7;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    padding: 10px 22px;
    border: none;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-primary {
    background: var(--purple);
    color: white;
  }
  .btn-primary:hover { background: var(--purple-light); }

  .btn-secondary {
    background: transparent;
    color: var(--purple);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--purple); background: var(--purple-pale); }

  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-left: auto;
  }

  /* Results */
  #results { display: none; }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .summary-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    text-align: center;
  }

  .summary-card .num {
    font-family: 'DM Sans', sans-serif;
    font-size: 2rem;
    line-height: 1;
    color: var(--purple);
    font-weight: 700;
    letter-spacing: -0.04em;
  }

  .summary-card .label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }

  .group-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(81,45,109,0.05);
  }

  .group-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .group-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .group-header h3 {
    font-size: 0.9rem;
    font-weight: 600;
    flex: 1;
  }

  .group-header .count-badge {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 20px;
    background: rgba(255,255,255,0.35);
    color: inherit;
    border: 1px solid rgba(255,255,255,0.4);
  }

  .group-body {
    padding: 0 0 8px;
  }

  .tsa-row {
    border-top: 1px solid var(--border);
  }

  .tsa-header {
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: background 0.15s;
  }

  .tsa-header:hover { background: var(--bg); }

  .tsa-name {
    font-size: 0.84rem;
    font-weight: 500;
    color: var(--text);
  }

  .tsa-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .item-count {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
  }

  .chevron {
    font-size: 0.65rem;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .tsa-row.open .chevron { transform: rotate(180deg); }

  .tsa-items {
    display: none;
    padding: 4px 20px 12px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  .tsa-row.open .tsa-items { display: block; }

  .diary-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
    line-height: 1.5;
    color: var(--text);
  }

  .diary-item:last-child { border-bottom: none; }

  .diary-item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 5px;
    align-items: center;
  }

  .diary-item .match-place {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    background: var(--purple-pale);
    color: var(--purple);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .diary-item .item-date {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    background: var(--teal-light);
    color: var(--teal);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .diary-item .item-text {
    color: var(--text);
    line-height: 1.55;
  }

  .no-match-section {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .no-match-header {
    padding: 14px 20px;
    background: #f7f3fa;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }

  .no-match-header h3 {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--muted);
  }

  .no-match-body {
    display: none;
    padding: 12px 20px;
  }

  .no-match-section.open .no-match-body { display: block; }

  .no-match-item {
    font-size: 0.82rem;
    color: var(--muted);
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    line-height: 1.5;
  }
  .no-match-item:last-child { border-bottom: none; }

  .cross-patch-section {
    background: var(--white);
    border: 1px solid #f0c060;
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .cross-patch-header {
    padding: 14px 20px;
    background: #fffbf0;
    border-bottom: 1px solid #f0c060;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }

  .cross-patch-header h3 {
    font-size: 0.88rem;
    font-weight: 600;
    color: #8a6000;
  }

  .cross-patch-body {
    display: none;
    padding: 12px 20px;
  }

  .cross-patch-section.open .cross-patch-body { display: block; }

  .cross-patch-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.82rem;
    line-height: 1.5;
  }
  .cross-patch-item:last-child { border-bottom: none; }

  .cross-patch-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 5px;
  }

  .cross-patch-tag {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: #fff3cd;
    color: #7a5000;
    border: 1px solid #f0c060;
  }

  .tsa-row.tsa-empty .tsa-header {
    opacity: 0.45;
    cursor: default;
  }
  .tsa-row.tsa-empty .tsa-name {
    font-style: italic;
  }
  .tsa-row.tsa-empty .item-count {
    font-size: 0.7rem;
    letter-spacing: 0.03em;
  }

  /* Group colour headers */
  .group-header.focus1 { background: var(--focus1); color: white; }
  .group-header.focus2 { background: var(--focus2); color: white; }
  .group-header.london { background: var(--london); color: white; }
  .group-header.hub-se { background: var(--hub-se); color: white; }
  .group-header.hub-sw { background: var(--hub-sw); color: white; }
  .group-header.hub-n  { background: var(--hub-n);  color: white; }
  .group-header.scotland { background: var(--scotland); color: white; }
  .group-header.ni { background: var(--ni); color: white; }

  .group-header.focus1 .count-badge { border-color: rgba(255,255,255,0.3); }

  /* Dot colours */
  .dot-focus1 { background: var(--focus1); }
  .dot-focus2 { background: var(--focus2); }
  .dot-london { background: var(--london); }
  .dot-hub-se { background: var(--hub-se); }
  .dot-hub-sw { background: var(--hub-sw); }
  .dot-hub-n  { background: var(--hub-n); }
  .dot-scotland { background: var(--scotland); }
  .dot-ni { background: var(--ni); }

  .section-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--purple);
    margin-bottom: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 0.78rem;
  }

  .results-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .btn-export {
    background: var(--purple);
    color: white;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.85rem;
    padding: 9px 20px;
  }
  .btn-export:hover { background: var(--teal-dark); }

  .btn-group-export {
    background: rgba(255,255,255,0.2);
    color: white;
    border: 1px solid rgba(255,255,255,0.4);
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-group-export:hover { background: rgba(255,255,255,0.35); }

  .btn-ics {
    background: rgba(255,255,255,0.12);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-ics:hover { background: rgba(255,255,255,0.28); }

  .btn-tsa-ics {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 4px;
    background: var(--teal-light);
    color: var(--teal);
    border: 1px solid #a0edd8;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-tsa-ics:hover { background: #c8eeec; }
</style>
</head>

// ============================================================
// DIARY PARSING — section-date aware
// Walk line by line. When a date-header line is found, store it
// as the current section date. All story items beneath inherit it.
// ============================================================
// ============================================================
// CAPS PLACE LEADER — new story detection & location lookup
// PA stories begin with a place name in ALL CAPS, e.g. "LEEDS",
// "KING'S LYNN", "NEWCASTLE UPON TYNE". We detect those leading
// caps words as both the story delimiter and the location signal.
// ============================================================
const CAPS_NOISE = new Set([
  'A','AN','THE','IN','ON','AT','BY','OF','TO','FOR','AND','OR','BUT',
  'IS','WAS','ARE','WERE','HAS','HAVE','HAD','WILL','WOULD','COULD',
  'SHOULD','MAY','MIGHT','BE','BEEN','BEING','IT','HE','SHE','THEY',
  'WE','YOU','I','THIS','THAT','THESE','THOSE','NOT','NO','NEW','OLD',
  'PA','AP','UK','PM','AM','MP','PLC','NHS','BBC','ITV','PC','DC','KC',
  'CCTV','CLLR','DR','MR','MRS','MS','REV','ST','RD','AVE','FC',
]);

function extractCapsLeader(line) {
  // Strip a leading time stamp (e.g. "10:00 " or "09:30 ") before testing
  const stripped = line.replace(/^\d{1,2}:\d{2}\s+/, '');

  // Pattern 1: CAPS WORD(S) optionally with comma+CAPS (e.g. "VIENNA, AUSTRIA:") then colon
  const mColon = stripped.match(/^([A-Z][A-Z'\-]+(?:(?:\s+|\s*,\s*)[A-Z][A-Z'\-]+){0,4})\s*:/);
  if (mColon) {
    const candidate = mColon[1].trim();
    const tokens = candidate.replace(/,/g,' ').split(/\s+/);
    if (tokens.every(t => /^[A-Z][A-Z'\-]*$/.test(t)) &&
        tokens.some(t => !CAPS_NOISE.has(t) && t.length >= 2)) {
      return candidate;
    }
  }
  // Pattern 2: CAPS WORD(S) at line start with no colon (e.g. plain "LEEDS ...")
  const m = stripped.match(/^((?:[A-Z][A-Z'\-]+)(?:\s+(?:[A-Z][A-Z'\-]+)){0,3})(?:\s*[:–\-]|\s|$)/);
  if (!m) return null;
  const candidate = m[1].trim();
  const tokens = candidate.split(/\s+/);
  if (!tokens.every(t => /^[A-Z][A-Z'\-]*$/.test(t))) return null;
  if (!tokens.some(t => !CAPS_NOISE.has(t) && t.length >= 2)) return null;
  return candidate;
}

function isInternationalLeader(leader) {
  // Check if the first token (or the whole thing) is a known foreign country/city
  const tokens = leader.replace(/,/g,' ').split(/\s+/);
  return tokens.some(t => FOREIGN_COUNTRIES.has(t.toUpperCase()));
}

function findTSAFromLeader(leader) {
  // If the leader starts with a foreign country/city, don't try to match — return null
  if (isInternationalLeader(leader)) return null;
  // Normalise: strip commas, convert hyphens to spaces for lookup
  const normalised = leader.replace(/,/g, ' ').replace(/-/g, ' ').replace(/\s+/g, ' ').trim();
  const tokens = normalised.split(/\s+/);
  for (let len = tokens.length; len >= 1; len--) {
    const phrase = tokens.slice(0, len).join(' ').toLowerCase();
    if (PLACE_TO_TSA[phrase]) {
      return { tsa: PLACE_TO_TSA[phrase], matchedPlace: tokens.slice(0, len).join(' ') };
    }
  }
  return null;
}

// Place names that are too short/generic OR appear in common non-geographic phrases.
const AMBIGUOUS_PLACES = new Set([
  'street','stone','sale','wick','march','fleet','bury','hyde','ross','deal','chard',
  'holt','wells','bath','ely','eye','rye','hove','hull','hythe','ware','wye','lee',
  'lea','dun','frome','frame','crewe','leigh','poole','ryde','oban','tain','duns',
  'nairn','keith','perth','elgin','york','durham','reading','richmond','newark',
  'newbury','newport','newton','norwich','oxford','derby','ely','march','ware',
  'channel','avon','eden','exe','tyne','wear','thames','severn','mersey',
  'wales','welsh','sussex','essex','kent','surrey','cornwall','devon','stratford','hampshire',
  'suffolk','norfolk','warwickshire','lincolnshire','yorkshire','lancashire','cheshire',
  'wiltshire','dorset','somerset','gloucestershire','oxfordshire','berkshire','hertfordshire',
  'cowley','stanley','norton','chester','clifton','hamilton','reading','barton','newton','christchurch',
]);

// Phrases that contain a place name but are NOT geographic references —
// if the place match sits inside one of these, skip it.
const PLACE_PHRASE_EXCLUSIONS = [
  /\bPrincess of Wales\b/gi,
  /\bPrince of Wales\b/gi,
  /\bDuke of Wales\b/gi,
  /\bPlumstead\b/gi,  // not a TSA place but just in case
];

// Check whether a place name match is embedded in a known non-geographic phrase
function isExcludedPhrase(text, place) {
  for (const re of PLACE_PHRASE_EXCLUSIONS) {
    re.lastIndex = 0;
    let m;
    while ((m = re.exec(text)) !== null) {
      // If the place string appears within this matched phrase, exclude it
      if (m[0].toLowerCase().includes(place.toLowerCase())) return true;
    }
  }
  return false;
}

// Find place names in body text, but only where they appear as proper nouns —
// i.e. title-cased AND not immediately followed by another capital word
// (which would suggest they're part of a compound like "Reading Room").
function findSecondaryPlaces(itemText, excludeTSA) {
  const found = new Map();
  for (const place of SORTED_PLACES) {
    // Skip ambiguous short/generic words that cause false positives in address lines
    if (AMBIGUOUS_PLACES.has(place.toLowerCase())) continue;
    // Require at least 5 characters or be a multi-word place
    if (place.length < 5 && !place.includes(' ')) continue;

    const tsa = PLACE_TO_TSA[place];
    if (!tsa || tsa === excludeTSA) continue;

    // Skip if this place only appears inside a known non-geographic phrase
    if (isExcludedPhrase(itemText, place)) continue;

    // Build the title-cased version of the place as it would appear mid-sentence
    const titled = place.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    const escaped = titled.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
    // After the place, must NOT be followed by another capitalised word (avoids "Reading Room")
    const re = new RegExp(
      `(?<=[\\s,.(\\['"-]|^)${escaped}(?=[,.)\\]'"-]|\\s+[a-z]|'s|\\s*$)`, 'g'
    );
    if (re.test(itemText) && !found.has(tsa)) {
      found.set(tsa, place);
    }
  }
  return Array.from(found.entries()).map(([tsa, matchedPlace]) => ({ tsa, matchedPlace }));
}

// Pre-process: split a single line into multiple virtual lines wherever
// a new story starts mid-line. PA diaries often run date headers and
// stories together on one line with no line break.
function presplitLine(line) {
  // Step 1: split after a date header that runs straight into a story
  const dayNames = 'monday|tuesday|wednesday|thursday|friday|saturday|sunday';
  const monthNames = 'january|february|march|april|may|june|july|august|september|october|november|december|jan|feb|mar|apr|jun|jul|aug|sep|oct|nov|dec';
  line = line.replace(
    new RegExp(`((?:${dayNames})\\s+(?:(?:\\d{1,2}(?:st|nd|rd|th)?\\s+(?:${monthNames}))|(?:(?:${monthNames})\\s+\\d{1,2}(?:st|nd|rd|th)?))(?:\\s+\\d{4})?)\\s+([A-Z]{2,})`, 'gi'),
    (_, datepart, capsword) => datepart + '\n' + capsword
  );

  // Step 2: split after a UK postcode followed by more content
  // Postcode pattern: e.g. PO1 2EB, WC1B 3DG, SW1P 3NZ, EH8 9S (partial ok)
  // A new story after a postcode may start with: a time, a CAPS word, or plain text
  line = line.replace(
    /([A-Z]{1,2}\d{1,2}[A-Z]?\s+\d[A-Z]{0,2})\.\s+/g,
    (_, postcode) => postcode + '.\n'
  );

  // Step 2b: split on dash/em-dash separator followed by a time stamp
  // e.g. "Adjourned, date to be fixed – 10:00 Conclusion expected..."
  line = line.replace(
    /\s+[–—\-]+\s+(\d{1,2}:\d{2})\s+/g,
    (_, time) => '\n' + time + ' '
  );

  // Step 3: split mid-line on time + CAPS PLACE: e.g. "10:00 LONDON:" or "10:00 VIENNA, AUSTRIA:"
  line = line.replace(
    /(\.\s+|\s{2,})(\d{1,2}:\d{2}\s+)?([A-Z]{2,}(?:(?:\s+|,\s*)[A-Z]{2,}){0,4}\s*:)/g,
    (_, before, time, place) => before + '\n' + (time || '') + place
  );

  // Step 4: split mid-line on sentence-end + CAPS PLACE: e.g. ". LONDON:" or ". VIENNA, AUSTRIA:"
  line = line.replace(
    /([.!?]\s)([A-Z]{2,}(?:(?:\s+|,\s*)[A-Z]{2,}){0,4}\s*:)/g,
    (_, end, place) => end + '\n' + place
  );

  return line;
}

// Strip common PA footer/sign-off boilerplate that gets appended to the last story.
// Detects lines like "Abi Simpson Senior Editor..." or "Reaching over 25 million..."
function stripFooter(text) {
  // Split off anything from a line that looks like a personal sign-off or corporate footer
  const footerPatterns = [
    /\n[A-Z][a-z]+ [A-Z][a-z]+ (?:Senior |Deputy |Assistant )?Editor/,
    /\nPlease note my working hours/i,
    /\nReaching over \d/i,
    /\nWe are Bauer Media/i,
    /\nwww\.bauermedia\.co\.uk/i,
    /\nM \+44/,
    /\nE [a-z]+@bauermedia/i,
  ];
  for (const pat of footerPatterns) {
    const m = text.search(pat);
    if (m !== -1) text = text.slice(0, m);
  }
  return text.trim();
}

function parseDiary(text) {
  // Strip footer boilerplate before parsing
  text = stripFooter(text);

  // Expand any same-line story runs into separate lines
  const expanded = text.split(/\n/).map(presplitLine).join('\n');
  const lines = expanded.split(/\n/);
  const results = [];
  let currentDate = null;
  let current = [];
  let currentLeader = null;

  function flush() {
    if (!current.length) return;
    const joined = current.join(' ').trim();
    if (joined) results.push({ text: joined, date: currentDate, leader: currentLeader });
    current = [];
    currentLeader = null;
  }

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;

    // Date header line
    if (isDateHeader(trimmed)) {
      flush();
      currentDate = formatDateHeader(trimmed);
      continue;
    }

    // A bare time stamp at the start of a line (e.g. "10:00:" or "10:00 Pre-inquest...")
    // with no caps place leader means a new untitled story — flush and start fresh
    const isBareTime = /^\d{1,2}:\d{2}:?\s/.test(trimmed) && !extractCapsLeader(trimmed);
    if (isBareTime && current.length > 0) {
      flush();
      current.push(trimmed);
      continue;
    }

    // Line opening with an ALL-CAPS place leader = new story
    const leader = extractCapsLeader(trimmed);
    if (leader) {
      flush();
      currentLeader = leader;
      current.push(trimmed);
      continue;
    }

    // Continuation of current story
    current.push(trimmed);
  }
  flush();

  return results;
}

// ============================================================
// DATE HEADER DETECTION
// Recognise lines that are diary section-date headers, e.g.
// "MONDAY 22 APRIL", "Tuesday 22nd April 2025", "22/04/2025"
// These apply to every story beneath them until the next one.
// ============================================================
const MONTHS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];

// Patterns that identify a standalone date-header line
const DATE_HEADER_PATTERNS = [
  // "Monday 22 April 2025", "TUESDAY 22ND APRIL" — day number month
  new RegExp(`^(${DAYS.join('|')}),?\\s+(\\d{1,2})(?:st|nd|rd|th)?\\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*(?:\\s+\\d{4})?$`, 'i'),
  // "Saturday April 18", "Sunday April 19" — PA's actual format: day month number
  new RegExp(`^(${DAYS.join('|')}),?\\s+(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\\s+(\\d{1,2})(?:st|nd|rd|th)?(?:\\s+\\d{4})?$`, 'i'),
  // "22 April 2025", "22nd April"
  /^(\d{1,2})(?:st|nd|rd|th)?\s+(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:\s+\d{4})?$/i,
  // "April 22", "April 22nd 2025"
  /^(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\s+(\d{1,2})(?:st|nd|rd|th)?(?:\s+\d{4})?$/i,
  // "22/04/2025", "22-04-25"
  /^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/,
  // Day name alone on its own line: "MONDAY", "Tuesday"
  new RegExp(`^(${DAYS.join('|')})$`, 'i'),
];

function isDateHeader(line) {
  const t = line.trim();
  if (!t || t.length > 60) return false; // headers are short
  return DATE_HEADER_PATTERNS.some(p => p.test(t));
}

function formatDateHeader(raw) {
  let s = raw.trim();
  // Expand month abbreviations to full names
  for (let i = 0; i < MONTHS.length; i++) {
    s = s.replace(new RegExp(`\\b${MONTHS[i]}[a-z]*\\b`, 'gi'), MONTH_NAMES[i]);
  }
  // Title-case everything
  s = s.replace(/\b\w/g, c => c.toUpperCase());
  return s.replace(/\s+/g, ' ').trim();
}

// ============================================================
// GLOBAL STATE (for export)
// ============================================================
let _lastGrouped = {};
let _lastUnmatched = [];
let _lastCrossPatch = [];
let _lastTotal = 0;

// ============================================================
// UI FUNCTIONS
// ============================================================
function analyse() {
  const text = document.getElementById('diaryInput').value.trim();
  if (!text) { alert('Please paste some diary text first.'); return; }

  const parsed = parseDiary(text);
  const grouped = {};
  const unmatched = [];
  const crossPatch = []; // stories placed in more than one group

  for (const { text: itemText, date, leader } of parsed) {
    if (!itemText.trim()) continue;

    // Build list of all matching TSAs for this story.
    // If the story has a definitive PLACE: caps leader, trust it exclusively.
    // If there is no caps leader, scan body text — but only assign if all
    // matches point to the same group (avoids false positives like "Westminster"
    // and "Sussex" both appearing in an unrelated national story).
    let matches = [];

    const leaderResult = leader ? findTSAFromLeader(leader) : null;
    if (leaderResult) {
      matches.push(leaderResult);
      // Also scan body text for secondary place mentions in OTHER TSAs (cross-patch)
      // Uses capitalisation-aware matching to avoid false positives like "Reading Room"
      const secondary = findSecondaryPlaces(itemText, leaderResult.tsa);
      for (const s of secondary) matches.push(s);
    } else if (leader && isInternationalLeader(leader)) {
      // Explicitly international — send straight to unmatched, don't scan body text
    } else {
      // No caps leader — scan full text, but only assign if all matches agree on one group
      const textMatches = findSecondaryPlaces(itemText, null);
      if (textMatches.length > 0) {
        const groups = [...new Set(textMatches.map(m => GROUP_MAPPING[m.tsa] || 'Other'))];
        if (groups.length === 1) {
          matches = textMatches;
        }
      }
    }

    if (matches.length === 0) {
      unmatched.push({ text: itemText, date, leader });
      continue;
    }

    // Determine unique groups this story touches
    const groupsHit = [...new Set(matches.map(m => GROUP_MAPPING[m.tsa] || 'Other'))];

    // Place story into every matching TSA/group
    for (const { tsa, matchedPlace } of matches) {
      const group = GROUP_MAPPING[tsa] || 'Other';
      if (!grouped[group]) grouped[group] = {};
      if (!grouped[group][tsa]) grouped[group][tsa] = [];
      // Show all matched places as a badge list on the story
      grouped[group][tsa].push({ text: itemText, matchedPlace, allMatches: matches, date });
    }

    // Track cross-patch stories (more than one group)
    if (groupsHit.length > 1) {
      crossPatch.push({ text: itemText, date, matches, groups: groupsHit });
    }
  }

  _lastGrouped = grouped;
  _lastUnmatched = unmatched;
  _lastCrossPatch = crossPatch;
  _lastTotal = parsed.length;

  renderResults(grouped, unmatched, crossPatch, parsed.length);
}

function renderResults(grouped, unmatched, crossPatch, total) {
  const matched = total - unmatched.length;
  const groupCount = Object.keys(grouped).length;

  const summaryBar = document.getElementById('summaryBar');
  summaryBar.innerHTML = `
    <div class="summary-card"><div class="num">${total}</div><div class="label">Total Items</div></div>
    <div class="summary-card"><div class="num">${matched}</div><div class="label">Matched</div></div>
    <div class="summary-card"><div class="num">${crossPatch.length}</div><div class="label">Cross-patch</div></div>
    <div class="summary-card"><div class="num">${unmatched.length}</div><div class="label">Unmatched</div></div>
    <div class="summary-card"><div class="num">${GROUP_ORDER.length}</div><div class="label">Groups</div></div>
  `;

  const grid = document.getElementById('groupsGrid');
  grid.innerHTML = '';

  for (const groupName of GROUP_ORDER) {
    const style = GROUP_STYLES[groupName] || { cls: 'hub-n', dot: 'dot-hub-n' };
    const tsaMap = grouped[groupName] || {};

    // All TSAs that belong to this group
    const allTSAsInGroup = Object.entries(GROUP_MAPPING)
      .filter(([, g]) => g === groupName)
      .map(([tsa]) => tsa)
      .sort();

    const totalInGroup = Object.values(tsaMap).reduce((s,arr) => s + arr.length, 0);

    const card = document.createElement('div');
    card.className = 'group-card';

    let tsaHTML = '';
    for (const tsaName of allTSAsInGroup) {
      const tsaItems = tsaMap[tsaName] || [];
      const isEmpty = tsaItems.length === 0;

      const itemsHTML = tsaItems.map(i => {
        const isCross = i.allMatches && i.allMatches.length > 1;
        const metaBadges = [
          i.date ? `<span class="item-date">📅 ${escapeHTML(i.date)}</span>` : '',
          `<span class="match-place">📍 ${capitalise(i.matchedPlace)}</span>`,
          isCross ? `<span class="cross-patch-tag">↔ cross-patch</span>` : '',
        ].filter(Boolean).join('');
        return `
          <div class="diary-item">
            <div class="diary-item-meta">${metaBadges}</div>
            <div class="item-text">${escapeHTML(i.text)}</div>
          </div>`;
      }).join('');

      const tsaIcsBtn = tsaItems.length > 0
        ? '<button class="btn-tsa-ics" data-action="tsa-ics" data-group="' + groupName.replace(/&/g,'&amp;') + '" data-tsa="' + tsaName.replace(/&/g,'&amp;') + '">📅 ICS</button>'
        : '';

      const itemCount = isEmpty ? '—' : (tsaItems.length + ' item' + (tsaItems.length !== 1 ? 's' : ''));
      const itemsDiv = isEmpty ? '' : '<div class="tsa-items">' + itemsHTML + '</div>';

      tsaHTML += `
        <div class="tsa-row${isEmpty ? ' tsa-empty' : ''}">
          <div class="tsa-header" onclick="this.parentElement.classList.toggle('open')">
            <span class="tsa-name">${escapeHTML(tsaName)}</span>
            <div class="tsa-meta">
              <span class="item-count">${itemCount}</span>
              ${tsaIcsBtn}
              ${isEmpty ? '' : '<span class="chevron">▼</span>'}
            </div>
          </div>
          ${itemsDiv}
        </div>`;
    }

    const exportBtn = totalInGroup > 0
      ? '<button class="btn-group-export" data-action="group-word" data-group="' + groupName.replace(/&/g,'&amp;') + '">'
        + '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
        + ' Word</button>'
      : '';

    const icsBtn = totalInGroup > 0
      ? '<button class="btn-ics" data-action="group-ics" data-group="' + groupName.replace(/&/g,'&amp;') + '">📅 ICS</button>'
      : '';

    card.innerHTML = `
      <div class="group-header ${style.cls}">
        <h3>${escapeHTML(groupName)}</h3>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="count-badge">${totalInGroup} item${totalInGroup !== 1 ? 's' : ''}</span>
          ${exportBtn}
          ${icsBtn}
        </div>
      </div>
      <div class="group-body">${tsaHTML}</div>`;

    grid.appendChild(card);
  }

  // Event delegation for all export buttons in the grid
  // (avoids inline onclick with string args which break on & in group names)
  grid.onclick = function(e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    e.stopPropagation();
    const action = btn.dataset.action;
    const group  = btn.dataset.group;
    const tsa    = btn.dataset.tsa;
    if (action === 'group-word') exportGroupWord(group);
    else if (action === 'group-ics')  exportGroupICS(group);
    else if (action === 'tsa-ics')    exportTSAICS(group, tsa);
  };
  const crossPatchSection = document.getElementById('crossPatchSection');
  const crossPatchBody = document.getElementById('crossPatchBody');
  document.getElementById('crossPatchCount').textContent = crossPatch.length;
  if (crossPatch.length === 0) {
    crossPatchSection.style.display = 'none';
  } else {
    crossPatchSection.style.display = 'block';
    crossPatchBody.innerHTML = crossPatch.map(i => {
      const groupTags = i.groups.map(g => `<span class="cross-patch-tag">${escapeHTML(g)}</span>`).join('');
      const placeTags = i.matches.map(m => `<span class="match-place">📍 ${capitalise(m.matchedPlace)}</span>`).join('');
      const dateBadge = i.date ? `<span class="item-date">📅 ${escapeHTML(i.date)}</span>` : '';
      return `<div class="cross-patch-item">
        <div class="cross-patch-tags">${dateBadge}${groupTags}${placeTags}</div>
        <div class="item-text">${escapeHTML(i.text)}</div>
      </div>`;
    }).join('');
  }

  // Unmatched
  document.getElementById('noMatchCount').textContent = unmatched.length;
  const noMatchSection = document.getElementById('noMatchSection');
  const noMatchBody = document.getElementById('noMatchBody');
  if (unmatched.length === 0) {
    noMatchSection.style.display = 'none';
  } else {
    noMatchSection.style.display = 'block';
    noMatchBody.innerHTML = unmatched.map(i => {
      const dateBadge = i.date ? `<span class="item-date">📅 ${escapeHTML(i.date)}</span>` : '';
      const datePart = dateBadge ? '<div style="margin-bottom:3px;">' + dateBadge + '</div>' : '';
      return '<div class="no-match-item">' + datePart + escapeHTML(i.text) + '</div>';
    }).join('');
  }

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ============================================================
// DOCX EXPORT — pure browser JS, no external libraries
// Builds a valid .docx (OOXML) ZIP from scratch
// ============================================================

// Minimal CRC32 + ZIP builder
const CRC32_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[i] = c;
  }
  return t;
})();

function crc32(buf) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < buf.length; i++) c = CRC32_TABLE[(c ^ buf[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}

function strToBytes(s) {
  return new TextEncoder().encode(s);
}

function uint16LE(n) { return [n & 0xFF, (n >> 8) & 0xFF]; }
function uint32LE(n) { return [n & 0xFF, (n >> 8) & 0xFF, (n >> 16) & 0xFF, (n >> 24) & 0xFF]; }

function buildZip(files) {
  // files: [{name, data: Uint8Array}]
  const parts = [];
  const centralDir = [];
  let offset = 0;

  for (const f of files) {
    const nameBytes = strToBytes(f.name);
    const crc = crc32(f.data);
    const local = new Uint8Array([
      0x50,0x4B,0x03,0x04, // local file header sig
      20,0,               // version needed
      0,0,                // flags
      0,0,                // compression (stored)
      0,0,0,0,            // mod time/date
      ...uint32LE(crc),
      ...uint32LE(f.data.length),
      ...uint32LE(f.data.length),
      ...uint16LE(nameBytes.length),
      0,0,                // extra len
      ...nameBytes,
      ...f.data
    ]);
    parts.push(local);

    centralDir.push(new Uint8Array([
      0x50,0x4B,0x01,0x02, // central dir sig
      20,0,               // version made by
      20,0,               // version needed
      0,0,0,0,0,0,0,0,    // flags, compression, time, date
      ...uint32LE(crc),
      ...uint32LE(f.data.length),
      ...uint32LE(f.data.length),
      ...uint16LE(nameBytes.length),
      0,0,0,0,0,0,        // extra, comment, disk, attr
      0,0,0,0,            // external attr
      ...uint32LE(offset),
      ...nameBytes
    ]));

    offset += local.length;
  }

  const cdOffset = offset;
  const cdSize = centralDir.reduce((s, b) => s + b.length, 0);
  const eocd = new Uint8Array([
    0x50,0x4B,0x05,0x06, // end of central dir
    0,0,0,0,
    ...uint16LE(files.length),
    ...uint16LE(files.length),
    ...uint32LE(cdSize),
    ...uint32LE(cdOffset),
    0,0
  ]);

  const all = [...parts, ...centralDir, eocd];
  const total = all.reduce((s, b) => s + b.length, 0);
  const out = new Uint8Array(total);
  let pos = 0;
  for (const b of all) { out.set(b, pos); pos += b.length; }
  return out;
}

function xmlEsc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&apos;');
}

// Build the Word XML document
function buildDocXML(sections) {
  // sections: [{type:'title'|'heading1'|'heading2'|'heading3'|'body'|'meta'|'spacer', text, color, italic, bold}]
  const paras = sections.map(s => {
    const color = s.color || '000000';
    const sz = s.type === 'title' ? 36 : s.type === 'heading1' ? 28 : s.type === 'heading2' ? 22 : s.type === 'meta' ? 17 : 19;
    const bold = s.bold || ['title','heading1','heading2','heading3','meta'].includes(s.type) ? '1' : '0';
    const italic = s.italic ? '<w:i/><w:iCs/>' : '';
    const spaceBefore = s.type === 'title' ? 0 : s.type === 'heading1' ? 400 : s.type === 'heading2' ? 200 : s.type === 'meta' ? 80 : 0;
    const spaceAfter = s.type === 'heading1' ? 120 : s.type === 'heading2' ? 80 : s.type === 'meta' ? 40 : s.type === 'spacer' ? 200 : 140;
    const indent = s.type === 'body' ? '<w:ind w:left="360"/>' : '';
    const border = s.border ? `<w:pBdr><w:bottom w:val="single" w:sz="8" w:space="4" w:color="${s.border}"/></w:pBdr>` : '';
    const text = s.type === 'spacer' ? '' : xmlEsc(s.text || '');

    const boldTag = bold === '1' ? '<w:b/><w:bCs/>' : '';
    const runXml = text ? '<w:r><w:rPr><w:color w:val="' + color + '"/><w:sz w:val="' + (sz*2) + '"/><w:szCs w:val="' + (sz*2) + '"/>' + boldTag + italic + '</w:rPr><w:t xml:space="preserve">' + text + '</w:t></w:r>' : '';

    return `<w:p>
      <w:pPr><w:spacing w:before="${spaceBefore}" w:after="${spaceAfter}"/>${indent}${border}</w:pPr>
      ${runXml}
    </w:p>`;
  }).join('\n');

  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"
  xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"
  xmlns:o="urn:schemas-microsoft-com:office:office"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:wp14="http://schemas.microsoft.com/office/word/2010/wordprocessingDrawing"
  xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"
  xmlns:w10="urn:schemas-microsoft-com:office:word"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml"
  xmlns:wpg="http://schemas.microsoft.com/office/word/2010/wordprocessingGroup"
  xmlns:wpi="http://schemas.microsoft.com/office/word/2010/wordprocessingInk"
  xmlns:wne="http://schemas.microsoft.com/office/word/2006/wordml"
  xmlns:wps="http://schemas.microsoft.com/office/word/2010/wordprocessingShape"
  mc:Ignorable="w14 wp14">
<w:body>
${paras}
<w:sectPr>
  <w:pgSz w:w="11906" w:h="16838"/>
  <w:pgMar w:top="1080" w:right="1080" w:bottom="1080" w:left="1080"/>
</w:sectPr>
</w:body>
</w:document>`;
}

const GROUP_EXPORT_COLORS = {
  'Focus 1':            'C0392B',
  'Focus 2':            '1A6FA8',
  'London':             'E67E22',
  'Hub South and East': '27AE60',
  'Hub South & West':   '8E44AD',
  'Hub North':          '2980B9',
  'Scotland':           '16A085',
  'Northern Ireland':   'D35400',
};

function buildSectionsForGroup(groupName, tsaMap) {
  const col = GROUP_EXPORT_COLORS[groupName] || '512d6d';
  const allTSAs = Object.entries(GROUP_MAPPING).filter(([,g]) => g === groupName).map(([t]) => t).sort();
  const totalInGroup = Object.values(tsaMap).reduce((s,a) => s + a.length, 0);
  const sections = [];

  sections.push({ type: 'heading1', text: groupName + '  (' + totalInGroup + ' item' + (totalInGroup !== 1 ? 's' : '') + ')', color: col, border: col });
  sections.push({ type: 'spacer' });

  for (const tsaName of allTSAs) {
    const items = tsaMap[tsaName] || [];
    const tsaLabel = tsaName + (items.length === 0 ? ' — no items' : '  (' + items.length + ')');
    sections.push({ type: 'heading2', text: tsaLabel, color: items.length === 0 ? 'AAAAAA' : '333333', italic: items.length === 0 });

    for (const item of items) {
      const meta = [item.date ? `Date: ${item.date}` : '', `Location: ${capitalise(item.matchedPlace)}`].filter(Boolean).join('   |   ');
      if (meta) sections.push({ type: 'meta', text: meta, color: '512d6d', bold: true });
      sections.push({ type: 'body', text: item.text, color: '1a1a2e' });
    }
  }
  return sections;
}

function buildDocxBlob(sectionsContent, title) {
  const now = new Date();
  const stamp = now.toLocaleDateString('en-GB', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  const allSections = [
    { type: 'title', text: title, color: '512d6d' },
    { type: 'meta', text: `Generated: ${stamp}`, color: '888888', bold: false },
    { type: 'spacer' },
    ...sectionsContent
  ];

  const docXml = buildDocXML(allSections);

  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;

  const rels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  const wordRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
</Relationships>`;

  const zip = buildZip([
    { name: '[Content_Types].xml', data: strToBytes(contentTypes) },
    { name: '_rels/.rels', data: strToBytes(rels) },
    { name: 'word/document.xml', data: strToBytes(docXml) },
    { name: 'word/_rels/document.xml.rels', data: strToBytes(wordRels) },
  ]);

  return new Blob([zip], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
}

function exportWord() {
  if (!_lastTotal) { alert('Run an analysis first.'); return; }
  const now = new Date();
  const sections = [];

  const matched = _lastTotal - _lastUnmatched.length;
  sections.push({ type: 'meta', text: `Total: ${_lastTotal}  |  Matched: ${matched}  |  Cross-patch: ${_lastCrossPatch.length}  |  Unmatched: ${_lastUnmatched.length}`, color: '555555', bold: false });
  sections.push({ type: 'spacer' });

  for (const groupName of GROUP_ORDER) {
    const tsaMap = _lastGrouped[groupName] || {};
    sections.push(...buildSectionsForGroup(groupName, tsaMap));
    sections.push({ type: 'spacer' });
  }

  if (_lastCrossPatch.length > 0) {
    sections.push({ type: 'heading1', text: `Cross-patch Stories  (${_lastCrossPatch.length})`, color: '8A6000', border: 'F0C060' });
    for (const item of _lastCrossPatch) {
      const meta = [item.date ? `Date: ${item.date}` : '', `Groups: ${item.groups.join(', ')}`, `Places: ${item.matches.map(m=>capitalise(m.matchedPlace)).join(', ')}`].filter(Boolean).join('   |   ');
      sections.push({ type: 'meta', text: meta, color: '8A6000', bold: true });
      sections.push({ type: 'body', text: item.text, color: '1a1a2e' });
    }
    sections.push({ type: 'spacer' });
  }

  if (_lastUnmatched.length > 0) {
    sections.push({ type: 'heading1', text: `Unmatched Items  (${_lastUnmatched.length})`, color: '888888', border: 'CCCCCC' });
    for (const item of _lastUnmatched) {
      if (item.date) sections.push({ type: 'meta', text: `Date: ${item.date}`, color: '888888', bold: true });
      sections.push({ type: 'body', text: item.text, color: '888888' });
    }
  }

  const blob = buildDocxBlob(sections, 'PA Diary Analysis');
  downloadBlob(blob, `PA_Diary_${now.toISOString().slice(0,10)}.docx`);
}

function exportGroupWord(groupName) {
  if (!_lastTotal) return;
  const now = new Date();
  const tsaMap = _lastGrouped[groupName] || {};
  const sections = buildSectionsForGroup(groupName, tsaMap);
  const blob = buildDocxBlob(sections, `PA Diary — ${groupName}`);
  const safeName = groupName.replace(/[^a-zA-Z0-9]/g, '_');
  downloadBlob(blob, `PA_${safeName}_${now.toISOString().slice(0,10)}.docx`);
}


// ============================================================
// ICS CALENDAR EXPORT
// ============================================================

function parseDiaryDate(dateStr) {
  if (!dateStr) return null;
  const cleaned = dateStr
    .replace(/(\d+)(st|nd|rd|th)/gi, '$1')
    .replace(/^(monday|tuesday|wednesday|thursday|friday|saturday|sunday),?\s*/i, '');
  const d = new Date(cleaned + ' 2026');
  if (!isNaN(d)) return d;
  const d2 = new Date(cleaned);
  if (!isNaN(d2)) return d2;
  return null;
}

function icsDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}${m}${day}`;
}

function icsEscape(s) {
  return String(s)
    .replace(/;/g, '\\;')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '');
}

function icsFold(line) {
  const bytes = new TextEncoder().encode(line);
  if (bytes.length <= 75) return line;
  const parts = [];
  let pos = 0, first = true;
  while (pos < bytes.length) {
    const chunk = bytes.slice(pos, pos + (first ? 75 : 74));
    parts.push((first ? '' : ' ') + new TextDecoder().decode(chunk));
    pos += chunk.length;
    first = false;
  }
  return parts.join('\r\n');
}

function buildICS(items, calName) {
  const now = new Date();
  const stamp = now.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'') + 'Z';
  const uid_base = now.getTime();
  const events = items.map((item, idx) => {
    const d = parseDiaryDate(item.date);
    if (!d) return null;
    const dateStr = icsDate(d);
    const nextDay = new Date(d);
    nextDay.setDate(nextDay.getDate() + 1);
    const firstSentence = item.text.match(/^[^.!?]+[.!?]/)?.[0] || item.text.substring(0, 100);
    const summary = icsEscape(firstSentence.trim());
    const description = icsEscape(item.text);
    const location = icsEscape(capitalise(item.matchedPlace || ''));
    const uid = `pa-diary-${uid_base}-${idx}@analyser`;
    return [
      'BEGIN:VEVENT',
      icsFold(`UID:${uid}`),
      `DTSTAMP:${stamp}`,
      `DTSTART;VALUE=DATE:${dateStr}`,
      `DTEND;VALUE=DATE:${icsDate(nextDay)}`,
      icsFold(`SUMMARY:${location ? '[' + location + '] ' : ''}${summary}`),
      icsFold(`DESCRIPTION:${description}`),
      location ? icsFold(`LOCATION:${location}`) : null,
      'END:VEVENT'
    ].filter(Boolean).join('\r\n');
  }).filter(Boolean);
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//PA Diary Analyser//EN',
    `X-WR-CALNAME:${icsEscape(calName)}`,'CALSCALE:GREGORIAN','METHOD:PUBLISH',
    ...events,'END:VCALENDAR'].join('\r\n');
}

function downloadICS(content, filename) {
  const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
}

function exportGroupICS(groupName) {
  if (!_lastTotal) return;
  const tsaMap = _lastGrouped[groupName] || {};
  const allItems = Object.values(tsaMap).flat().filter(i => i.date);
  if (!allItems.length) { alert('No dated items in this group.'); return; }
  const ics = buildICS(allItems, `PA Diary \u2014 ${groupName}`);
  downloadICS(ics, `PA_${groupName.replace(/[^a-zA-Z0-9]/g,'_')}_${new Date().toISOString().slice(0,10)}.ics`);
}

function exportTSAICS(groupName, tsaName) {
  if (!_lastTotal) return;
  const items = (_lastGrouped[groupName]?.[tsaName] || []).filter(i => i.date);
  if (!items.length) { alert('No dated items in this station.'); return; }
  const ics = buildICS(items, `PA Diary \u2014 ${tsaName}`);
  downloadICS(ics, `PA_${tsaName.replace(/[^a-zA-Z0-9]/g,'_')}_${new Date().toISOString().slice(0,10)}.ics`);
}


function clearAll() {
  document.getElementById('diaryInput').value = '';
  document.getElementById('results').style.display = 'none';
  document.getElementById('charCount').textContent = '';
  _lastGrouped = {};
  _lastUnmatched = [];
  _lastCrossPatch = [];
  _lastTotal = 0;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function capitalise(str) {
  return str.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

// Live char count
document.getElementById('diaryInput').addEventListener('input', function() {
  const len = this.value.length;
  document.getElementById('charCount').textContent = len > 0 ? `${len.toLocaleString()} characters` : '';
});
